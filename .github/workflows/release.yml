name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.2.0). Leave empty when triggered by tag push.'
        required: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: cargoterm

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package tarball
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${GITHUB_REF_NAME}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
            VERSION="${VERSION#v}"
          fi
          if [ -z "${VERSION}" ]; then
            VERSION="dev"
          fi
          STAGE="${BIN_NAME}-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${STAGE}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${STAGE}/"
          cp README.md LICENSE "dist/${STAGE}/"
          cd dist
          tar -czf "${STAGE}.tar.gz" "${STAGE}"
          shasum -a 256 "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"
          echo "tarball=dist/${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/${STAGE}.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.tarball }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          draft: false
          prerelease: false
          generate_release_notes: true

  bump-tap:
    name: Bump Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Check for tap token
        id: check
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN secret is not set — skipping tap bump."
            echo "To enable automatic tap bumps, create a fine-grained PAT with"
            echo "Contents: read/write on GoCelesteAI/homebrew-tap and add it as"
            echo "a repository secret named HOMEBREW_TAP_TOKEN."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tap repo
        if: steps.check.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: GoCelesteAI/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        if: steps.check.outputs.enabled == 'true'
        shell: bash
        working-directory: tap
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Bumping cargoterm formula to ${VERSION}"

          fetch_sha () {
            local target="$1"
            curl -fsSL "https://github.com/GoCelesteAI/cargoterm/releases/download/v${VERSION}/cargoterm-${VERSION}-${target}.tar.gz.sha256" | awk '{print $1}'
          }

          SHA_ARM=$(fetch_sha aarch64-apple-darwin)
          SHA_X86=$(fetch_sha x86_64-apple-darwin)
          SHA_LIN=$(fetch_sha x86_64-unknown-linux-gnu)

          python3 - "$VERSION" "$SHA_ARM" "$SHA_X86" "$SHA_LIN" <<'PY'
          import pathlib, re, sys
          version, sha_arm, sha_x86, sha_lin = sys.argv[1:5]
          p = pathlib.Path("Formula/cargoterm.rb")
          s = p.read_text()
          s = re.sub(r'version "[^"]+"', f'version "{version}"', s)
          s = re.sub(r'releases/download/v[^/]+/cargoterm-[^-]+-', f'releases/download/v{version}/cargoterm-{version}-', s)

          def swap_sha(text, target_frag, new_sha):
              pat = re.compile(r'(url "[^"]*' + re.escape(target_frag) + r'"\s*\n\s*sha256 ")[0-9a-f]+(")')
              return pat.sub(r'\g<1>' + new_sha + r'\g<2>', text)

          s = swap_sha(s, "aarch64-apple-darwin.tar.gz", sha_arm)
          s = swap_sha(s, "x86_64-apple-darwin.tar.gz", sha_x86)
          s = swap_sha(s, "x86_64-unknown-linux-gnu.tar.gz", sha_lin)

          p.write_text(s)
          print(s)
          PY

      - name: Commit and push
        if: steps.check.outputs.enabled == 'true'
        working-directory: tap
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name "GoCelesteAI"
          git config user.email "254653478+GoCelesteAI@users.noreply.github.com"
          if git diff --quiet; then
            echo "Formula already up to date."
          else
            git add Formula/cargoterm.rb
            git commit -m "cargoterm ${VERSION}"
            git push origin main
          fi
